# Публикует статику на GitHub Pages. Контент для gorushkindop.com / Taplink не трогаем —
# canonical и og:url в index.html по-прежнему указывают на основной домен.
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
      # уберите строку ниже, если деплой только с main
      - home-redesign
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v4

      - name: Assemble site (exclude dev-only folders)
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='booking-ui' \
            --exclude='.DS_Store' \
            ./ _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
