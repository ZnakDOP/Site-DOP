<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Бронирование техники — Arsenii Gorushkin</title>
    <meta
      name="description"
      content="Корзина и бронирование съёмочного оборудования на одну или несколько смен."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="booking.css" />
  </head>
  <body class="booking-body">
    <div class="booking-page">
      <header class="booking-top card">
        <div class="booking-intro">
          <a class="booking-back" href="index.html">← На главную</a>
          <h1>Бронирование техники</h1>
        </div>
      </header>

      <div id="load-error" class="booking-error" hidden></div>

      <div class="booking-layout">
        <section class="card booking-catalog">
          <div class="card-inner">
            <h2 style="font-size: 20px; margin-bottom: 4px">Каталог</h2>
            <p class="subtitle" style="margin-top: 6px">Цены за одну смену. Итог умножается на число смен.</p>
            <div id="catalog"></div>
          </div>
        </section>

        <aside class="card booking-cart">
          <h2>Корзина</h2>
          <div class="date-range-field">
            <span class="date-range-field-title">Период аренды</span>
            <span class="calendar-hint">Первый тап — начало аренды, второй — окончание (один тап дважды = один день).</span>
            <div
              class="calendar-widget"
              id="booking-calendar"
              role="application"
              aria-label="Календарь: выберите дату начала, затем дату окончания"
            >
              <div class="calendar-widget-header">
                <button type="button" class="calendar-nav" id="cal-prev" aria-label="Предыдущий месяц">
                  ‹
                </button>
                <div class="calendar-month-label" id="cal-month-label"></div>
                <button type="button" class="calendar-nav" id="cal-next" aria-label="Следующий месяц">
                  ›
                </button>
              </div>
              <div class="calendar-weekdays" aria-hidden="true">
                <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
              </div>
              <div class="calendar-grid" id="cal-grid"></div>
              <p class="calendar-range-readout" id="cal-readout"></p>
            </div>
            <input id="date-from" name="date-from" type="hidden" />
            <input id="date-to" name="date-to" type="hidden" />
            <p class="date-range-meta">Смен в выбранном периоде: <strong id="shifts-count">1</strong></p>
          </div>
          <p id="cart-empty" class="cart-empty">Корзина пуста — добавьте технику из каталога.</p>
          <div id="cart-lines" class="cart-lines" aria-live="polite"></div>
          <div class="cart-total">
            <span>Итого</span>
            <strong id="cart-total">0 ₽</strong>
          </div>

          <form id="reserve-form" class="reserve-form">
            <label>
              Имя
              <input id="client-name" name="name" type="text" autocomplete="name" placeholder="Как к вам обращаться" />
            </label>
            <label>
              Название проекта
              <input
                id="client-project"
                name="project"
                type="text"
                autocomplete="off"
                placeholder="Например: Точка Банк, блог 16.04"
              />
            </label>
            <label>
              Телефон или Telegram
              <input
                id="client-contact"
                name="contact"
                type="text"
                autocomplete="tel"
                placeholder="+7… или @username"
              />
            </label>
            <label>
              Даты, площадка, пожелания
              <textarea id="client-dates" name="dates" placeholder="Например: 12–14 мая, Москва, нужен кей…"></textarea>
            </label>
            <div class="form-actions">
              <button id="btn-reserve" type="submit" class="btn-primary" disabled>Оформить заявку</button>
              <button id="btn-xl" type="button" class="btn-primary" disabled>Открыть в XL</button>
            </div>
            <p id="xl-status" class="xl-status" hidden></p>
          </form>
        </aside>
      </div>
    </div>
    <!-- ExcelJS (собран под Node): в браузере нужны глобалы, иначе load/writeBuffer падают молча или с неочевидной ошибкой -->
    <script>
      window.global = window;
      window.process = window.process || { browser: true, env: { NODE_ENV: "production" } };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    <script src="booking.js?v=xl-20260509c" defer></script>
  </body>
</html>
